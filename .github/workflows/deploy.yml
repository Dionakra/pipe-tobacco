name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Instalar NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20.3.0
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Construir aplicación estática
        # prebuild generates src/logos.json from public/logos/ automatically
        run: npm run build

      - name: Desplegar en Firebase Hosting y Firestore rules
        uses: w9jds/firebase-action@v13.6.0
        with:
          args: deploy --only hosting,firestore:rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
